<VirtualHost *:80>
    ServerName privaccess.local
    DocumentRoot "C:/xampp/htdocs/privaccess/public"
    <Directory "C:/xampp/htdocs/privaccess/public">
        Require all granted
        AllowOverride All
        Options Indexes FollowSymLinks
    </Directory>
    ErrorLog "logs/privaccess-error.log"
    CustomLog "logs/privaccess-access.log" common
</VirtualHost>
